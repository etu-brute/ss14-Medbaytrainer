
# patient NPCs

- type: entity
  id: MobMedTrainingPatientBase
  abstract: true
  parent: MobHumanSyndicateAgentBase
  name: patient
  description: A person in need of medical attention.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        100: Critical
        200: Dead
    - type: HTN
      rootTask:
        task: MedPatientIdle
    - type: NpcFactionMember
      factions:
        - NanoTrasen

- type: entity
  id: MobMedTrainingPatientHuman
  parent: MobMedTrainingPatientBase
  name: patient
  suffix: Human

- type: entity
  id: MobMedTrainingPatientReptilian
  parent: MobMedTrainingPatientBase
  name: patient
  suffix: Reptilian
  components:
    - type: HumanoidProfile
      species: Reptilian

