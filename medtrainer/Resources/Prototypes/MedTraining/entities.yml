# Paramedic NPC

- type: entity
  id: MobMedTrainingParamedic
  parent: MobHumanSyndicateAgentBase
  name: paramedic
  description: An emergency medical technician delivering a critical patient.
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        200: Dead
    - type: HTN
      rootTask:
        task: MedParamedicDeliver
    - type: NpcFactionMember
      factions:
        - NanoTrasen
    - type: MedTrainingParamedic

# Reset button

- type: entity
  id: MedTrainingReadyButton
  name: next patient button
  description: Press this button when you are ready to receive the next training patient.
  components:
    - type: Transform
    - type: WallMount
      arc: 360
    - type: Physics
      canCollide: false
    - type: Clickable
    - type: Sprite
      sprite: Structures/Wallmounts/switch.rsi
      state: on
    - type: InteractionOutline
    - type: MedTrainingButton

# Scenario coordinator

- type: entity
  id: MedTrainingScenarioCoordinator
  name: med training scenario
  suffix: DoNotDelete
  components:
    - type: Transform
    - type: MedTrainingScenario

# Stasis bed unique

- type: entity
  id: MedTrainingStasisBed
  parent: StasisBed
  name: stasis bed
  suffix: MedTraining
  components:
    - type: MedTrainingStasisBed

